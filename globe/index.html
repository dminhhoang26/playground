<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Globe Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    @keyframes earthRotate {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    @keyframes twinkling {

      0%,
      100% {
        opacity: 0.1;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes twinkling-slow {

      0%,
      100% {
        opacity: 0.1;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes twinkling-long {

      0%,
      100% {
        opacity: 0.1;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes twinkling-fast {

      0%,
      100% {
        opacity: 0.1;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="flex items-center justify-center h-screen">
    <div
      class="relative w-[250px] h-[250px] rounded-full overflow-hidden shadow-[0_0_20px_rgba(255,255,255,0.2),-5px_0_8px_#c3f4ff_inset,15px_2px_25px_#000_inset,-24px_-2px_34px_#c3f4ff99_inset,250px_0_44px_#00000066_inset,150px_0_38px_#000000aa_inset]"
      style="background-image: url('https://pub-940ccf6255b54fa799a9b01050e6c227.r2.dev/globe.jpeg'); background-size: cover; background-position: left; animation: earthRotate 30s linear infinite">

      <div class="absolute left-[-20px] w-1 h-1 bg-white rounded-full" style="animation: twinkling 3s infinite" />
      <div class="absolute left-[-40px] top-[30px] w-1 h-1 bg-white rounded-full"
        style="animation: twinkling-slow 2s infinite" />
      <div class="absolute left-[350px] top-[90px] w-1 h-1 bg-white rounded-full"
        style=" animation: twinkling-long 4s infinite" />
      <div class="absolute left-[200px] top-[290px] w-1 h-1 bg-white rounded-full"
        style="animation: twinkling 3s infinite" />
      <div class="absolute left-[50px] top-[270px] w-1 h-1 bg-white rounded-full"
        style="animation: twinkling-fast 1.5s infinite" />
      <div class="absolute left-[250px] top-[-50px] w-1 h-1 bg-white rounded-full"
        style="animation: twinkling-long 4s infinite" />
      <div class="absolute left-[290px] top-[60px] w-1 h-1 bg-white rounded-full"
        style="animation: twinkling-slow 2s infinite" />
    </div>
  </div>
</body>

</html>
